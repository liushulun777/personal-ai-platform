server:
  port: 1086

spring:
  application:
    name: ai-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://172.18.0.34:5432/platform
    username: postgres
    password: postgres
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
    redis:
      host: 172.18.0.34
      port: 6379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 172.18.0.34:8848
        fail-fast: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  ai:
    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:sk-xxx}
      chat:
        options:
          model: gpt-4o

# 自定义AI模型配置
ai:
  models:
    default: mimo
    embedding-provider: ollama
    config:
      mimo:
        base-url: https://token-plan-cn.xiaomimimo.com
        api-key: ${MIMO_API_KEY:tp-cezrw9xmilycqudu0pqz5u99iiii94jgeuqvs4egpezk3afq}
        model: mimo-v2.5-pro
      openai:
        base-url: https://api.openai.com
        api-key: ${OPENAI_API_KEY:sk-xxx}
        model: gpt-4o
      ollama:
        base-url: http://192.168.9.95:11434
        api-key: ollama
        model: nomic-embed-text

# 知识库配置
knowledge:
  chunk:
    default-size: 500
    default-overlap: 50
  embedding:
    dimension: 768

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

