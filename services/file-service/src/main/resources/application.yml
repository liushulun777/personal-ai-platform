server:
  port: 1084

spring:
  config:
    import: file:./config/application-env.yml
  application:
    name: file-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${INFRA_HOST:172.18.0.34}:5432/platform
    username: postgres
    password: postgres
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  data:
    redis:
      host: ${INFRA_HOST:172.18.0.34}
      port: 16379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: ${INFRA_HOST:172.18.0.34}:8848
        fail-fast: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MinIO
minio:
  endpoint: http://${INFRA_HOST:172.18.0.34}:19000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: platform

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

