server:
  port: 1080

spring:
  config:
    import: file:./config/application-env.yml
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${INFRA_HOST:172.18.0.34}:8848
        fail-fast: false
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=1

        - id: blog-service
          uri: lb://blog-service
          predicates:
            - Path=/blog/**
          filters:
            - StripPrefix=1

        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1

        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/search/**
          filters:
            - StripPrefix=1

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=1

        - id: knowledge-service
          uri: lb://knowledge-service
          predicates:
            - Path=/knowledge/**
          filters:
            - StripPrefix=1

        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/project/**
          filters:
            - StripPrefix=1

        - id: mcp-service
          uri: lb://mcp-service
          predicates:
            - Path=/mcp/**
          filters:
            - StripPrefix=1

        - id: agent-service
          uri: lb://agent-service
          predicates:
            - Path=/agent/**
          filters:
            - StripPrefix=1

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

