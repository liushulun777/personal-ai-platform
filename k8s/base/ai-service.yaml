apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: platform/ai-service:latest
          ports:
            - containerPort: 1086
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: NACOS_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: NACOS_SERVER_ADDR
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DB_PORT
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: REDIS_PORT
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: OPENAI_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 1086
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 1086
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: platform
spec:
  selector:
    app: ai-service
  ports:
    - port: 1086
      targetPort: 1086
