server:
  port: 1090

spring:
  application:
    name: agent-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://172.18.0.34:5432/platform
    username: postgres
    password: postgres
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
    redis:
      host: 172.18.0.34
      port: 6379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 172.18.0.34:8848
        fail-fast: false
  kafka:
    bootstrap-servers: 172.18.0.34:29092

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

# AI 模型配置
ai:
  models:
    default-model: mimo
    config:
      mimo:
        base-url: https://token-plan-cn.xiaomimimo.com
        api-key: tp-cnq4bihy8ykip42l161tykqpqtlycb8ne8l4pb4d384v2ppg
        model: mimo-v2.5-pro

# Agent 配置
agent:
  workspace:
    base-path: workspace
    git-url: https://github.com/liushulun777/personal-ai-platform.git
  execution:
    max-retries: 3
    timeout: 300000

logging:
  level:
    com.platform.agent: debug
