server:
  port: 1082

spring:
  application:
    name: system-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://172.18.0.34:5432/platform
    username: postgres
    password: postgres
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
    redis:
      host: 172.18.0.34
      port: 6379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 172.18.0.34:8848
        fail-fast: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

# MinIO 配置
minio:
  endpoint: http://172.18.0.34:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: platform

