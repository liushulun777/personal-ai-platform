server:
  port: 1083

spring:
  config:
    import: file:./config/application-env.yml
  application:
    name: blog-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${INFRA_HOST:172.18.0.34}:5432/platform
    username: postgres
    password: postgres
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
    redis:
      host: ${INFRA_HOST:172.18.0.34}
      port: 16379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: ${INFRA_HOST:172.18.0.34}:8848
        fail-fast: false
    sentinel:
      transport:
        dashboard: localhost:8080
        port: 8719
      eager: false
  feign:
    sentinel:
      enabled: true
  kafka:
    bootstrap-servers: ${INFRA_HOST:172.18.0.34}:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # 不在 JSON 中写入 Java 类型信息，避免跨服务反序列化找不到类
        spring.json.add.type.headers: false
        # 元数据获取超时 3s
        metadata.max.age.ms: 3000
        # 发送超时 5s（默认 120s 太久）
        delivery.timeout.ms: 5000
        request.timeout.ms: 3000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

