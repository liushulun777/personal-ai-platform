server:
  port: 1087

spring:
  application:
    name: knowledge-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/platform
    username: postgres
    password: postgres
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:16379}
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        fail-fast: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# AI模型配置（用于生成嵌入向量）
ai:
  models:
    default: mimo
    config:
      mimo:
        base-url: ${MIMO_BASE_URL:https://api.xiaomi.com}
        api-key: ${MIMO_API_KEY:xxx}
        model: mimo-v2.5-pro
      openai:
        base-url: https://api.openai.com
        api-key: ${OPENAI_API_KEY:sk-xxx}
        model: gpt-4o

# 知识库配置
knowledge:
  chunk:
    default-size: 500
    default-overlap: 50
  embedding:
    dimension: 1024

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

logging:
  level:
    com.platform.knowledge: info
