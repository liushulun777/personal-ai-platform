server:
  port: 1086

spring:
  application:
    name: ai-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://172.18.0.34:5432/platform
    username: postgres
    password: postgres
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
    redis:
      host: 172.18.0.34
      port: 6379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 172.18.0.34:8848
        fail-fast: false
  ai:
    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:sk-xxx}
      chat:
        options:
          model: gpt-4o

# 自定义AI模型配置
ai:
  models:
    # 默认模型
    default: mimo
    # 模型配置
    config:
      mimo:
        base-url: ${MIMO_BASE_URL:https://api.xiaomi.com}
        api-key: ${MIMO_API_KEY:xxx}
        model: mimo-v2.5-pro
      openai:
        base-url: https://api.openai.com
        api-key: ${OPENAI_API_KEY:sk-xxx}
        model: gpt-4o

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

logging:
  level:
    com.platform.ai: debug
