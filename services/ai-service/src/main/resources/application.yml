server:
  port: 1086

spring:
  config:
    import: file:./config/application-env.yml
  application:
    name: ai-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${INFRA_HOST:172.18.0.34}:5432/platform
    username: postgres
    password: postgres
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
    redis:
      host: ${INFRA_HOST:172.18.0.34}
      port: 16379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: ${INFRA_HOST:172.18.0.34}:8848
        fail-fast: false
  ai:
    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:sk-xxx}
      chat:
        options:
          model: gpt-4o

# 自定义AI模型配置
ai:
  models:
    # 默认模型
    default: mimo
    # 模型配置
    config:
      mimo:
        base-url: https://token-plan-cn.xiaomimimo.com
        api-key: ${MIMO_API_KEY:tp-cnq4bihy8ykip42l161tykqpqtlycb8ne8l4pb4d384v2ppg}
        model: mimo-v2.5-pro
      openai:
        base-url: https://api.openai.com
        api-key: ${OPENAI_API_KEY:sk-xxx}
        model: gpt-4o

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

